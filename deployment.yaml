apiVersion: apps/v1
kind: Deployment
metadata:
  name: notesapp
  labels:
    app: notesapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notesapp
  template:
    metadata:
      labels:
        app: notesapp
    spec:
      containers:
        - name: notesapp
          image: sidsaha897/notebase:45
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1337
          env:
            - name: PORT
              value: "1337"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: notesapp-secrets
                  key: MONGO_URI
            - name: UPSTASH_REDIS_REST_URL
              valueFrom:
                secretKeyRef:
                  name: notesapp-secrets
                  key: UPSTASH_REDIS_REST_URL
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notesapp-secrets
                  key: UPSTASH_REDIS_REST_TOKEN
          readinessProbe:
            httpGet:
              path: /api/notes
              port: 1337
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/notes
              port: 1337
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notesapp
  labels:
    app: notesapp
spec:
  type: LoadBalancer
  selector:
    app: notesapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 1337
